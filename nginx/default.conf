server {
  listen 80;
  server_name _;
  client_max_body_size 60M;

  # SSE Notifications - DUHET te jete PARA /api/ block
  location /api/notifications/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Connection "";
    proxy_http_version 1.1;
    proxy_read_timeout 3600s;
    proxy_buffering off;
    proxy_cache off;
    add_header X-Accel-Buffering "no";
    proxy_pass http://api:8080/notifications/;
  }

  # API calls (frontend i dergon me /api/ prefix)
  location /api/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;
    proxy_pass http://api:8080/;
  }

  # Uploads
  location /uploads/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_pass http://api:8080/uploads/;
    add_header Cache-Control "public, max-age=2592000";
  }

  # PricingBridge proxy
  location /pb/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://api:8080/pb/;
  }

  # index.html - no cache
  location = /index.html {
    root /usr/share/nginx/html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
    etag on;
  }

  # Static assets me hash - cache i gjate
  location ~* \.(js|css)$ {
    root /usr/share/nginx/html;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location ~* \.(woff2?|ttf|eot|ico)$ {
    root /usr/share/nginx/html;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Te gjitha route-t e tjera -> React SPA
  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }
}
