# nginx/default-https.conf
# Versioni me HTTPS pÃ«r qasje nga telefoni me kamerÃ«
# PÃ«rdor vetÃ«m nÃ«se ke cert (shih scripts/generate-cert.sh)

server {
  listen 80;
  server_name _;
  # Ridrejto HTTP â†’ HTTPS
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name _;
  client_max_body_size 60M;

  ssl_certificate     /etc/nginx/certs/cert.pem;
  ssl_certificate_key /etc/nginx/certs/key.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;

  # SSE Notifications
  location /api/notifications/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Connection "";
    proxy_http_version 1.1;
    proxy_read_timeout 3600s;
    proxy_buffering off;
    proxy_cache off;
    add_header X-Accel-Buffering "no";
    proxy_pass http://api:8080/notifications/;
  }

  # API
  location /api/ {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;
    proxy_pass http://api:8080/;
  }

  # Uploads
  location /uploads/ {
    proxy_pass http://api:8080/uploads/;
    add_header Cache-Control "public, max-age=2592000";
  }

  # PricingBridge
  location /pb/ {
    proxy_set_header Host $host;
    proxy_pass http://api:8080/pb/;
  }

  # Static
  location = /index.html {
    root /usr/share/nginx/html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  location ~* \.(js|css)$ {
    root /usr/share/nginx/html;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location ~* \.(woff2?|ttf|eot|ico|png)$ {
    root /usr/share/nginx/html;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
}


